<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Memory Loss">
<meta name="theme-color" content="#0B0B0E">
<title>Memory Loss</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont/dist/tabler-icons.min.css">
<style>
  :root{
    --bg:#0B0B0E;
    --surface:#17171B;
    --surface-2:#1E1E23;
    --border:rgba(255,255,255,0.08);
    --border-strong:rgba(255,255,255,0.16);
    --text:#F2F2F0;
    --text-soft:#9A9AA2;
    --text-faint:#5F5F68;
    --teal:#35C9A5;
    --teal-deep:#1F8E71;
    --danger:#FF6B5B;
    --accent-bg:rgba(53,201,165,0.14);
    --ease:cubic-bezier(.22,.9,.32,1.28);
    --ease-soft:cubic-bezier(.25,.8,.35,1);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Helvetica Neue",sans-serif;
    -webkit-font-smoothing:antialiased;overscroll-behavior-y:none;}
  body{padding-bottom:calc(84px + env(safe-area-inset-bottom));min-height:100vh;}
  button{font-family:inherit;cursor:pointer;}
  input,textarea{font-family:inherit;}
  button{transition:transform .12s var(--ease-soft), background .15s ease, color .15s ease, border-color .15s ease;}
  button:active{transform:scale(0.96);}

  .shell{max-width:480px;margin:0 auto;}
  .fade-in{animation:fadeIn .28s var(--ease-soft) both;}
  @keyframes fadeIn{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}

  header{padding:26px 18px 14px;display:flex;align-items:flex-start;justify-content:space-between;}
  header .titles h1{margin:0 0 4px;font-size:25px;font-weight:600;letter-spacing:0.2px;}
  header .titles p{margin:0;font-size:12.5px;color:var(--text-soft);}

  .cloud-badge{
    display:inline-flex;align-items:center;gap:5px;font-size:11px;color:var(--text-soft);
    margin-top:6px;padding:3px 9px 3px 7px;border-radius:20px;background:var(--surface);border:1px solid var(--border);
  }
  .cloud-badge.on{color:var(--teal);}
  .cloud-badge i{font-size:12px;}

  main{padding:0 18px 8px;}

  .stat-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px;}
  .stat-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:14px 16px;transition:background .2s;}
  .stat-card .label{font-size:12px;color:var(--text-soft);margin:0 0 6px;}
  .stat-card .num{font-size:22px;font-weight:600;margin:0;}
  .stat-card .num span{font-size:13px;font-weight:400;color:var(--text-soft);margin-left:3px;}

  .search-wrap{margin-bottom:14px;position:relative;}
  .search-wrap i{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:var(--text-faint);font-size:15px;}
  .search-wrap input{
    width:100%;padding:10px 14px 10px 36px;border-radius:10px;
    border:1px solid var(--border);background:var(--surface);color:var(--text);font-size:15px;
    transition:border-color .15s ease, background .15s ease;
  }
  .search-wrap input::placeholder{color:var(--text-faint);}
  .search-wrap input:focus{outline:none;border-color:var(--teal);background:var(--surface-2);}

  .empty{text-align:center;padding:56px 20px;color:var(--text-soft);}
  .empty .glyph{font-size:28px;margin-bottom:10px;color:var(--text-faint);}
  .empty p{margin:4px 0;font-size:14px;line-height:1.6;}

  .segmented{
    position:relative;display:flex;background:var(--surface);border:1px solid var(--border);
    border-radius:11px;padding:3px;margin-bottom:14px;
  }
  .segmented .indicator{
    position:absolute;top:3px;bottom:3px;left:3px;width:calc(50% - 3px);
    background:var(--surface-2);border-radius:8px;transition:transform .28s var(--ease);
  }
  .segmented button{
    position:relative;z-index:1;flex:1;border:none;background:transparent;color:var(--text-soft);
    padding:8px 0;border-radius:8px;font-size:13.5px;font-weight:500;
  }
  .segmented button.active{color:var(--text);}

  .pager-viewport{overflow:hidden;width:100%;}
  .pager-track{display:flex;width:200%;transition:transform .3s var(--ease);}
  .pager-track.dragging{transition:none;}
  .pager-page{width:50%;flex-shrink:0;min-width:0;}
  .pager-page:first-child{padding-right:4px;}
  .pager-page:last-child{padding-left:4px;}

  .cat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .cat-tile{
    background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:14px;text-align:left;
    display:flex;flex-direction:column;gap:10px;touch-action:none;-webkit-user-select:none;user-select:none;position:relative;
  }
  .cat-tile:active{background:var(--surface-2);}
  .cat-tile.jiggle{animation:tileJiggle 0.26s ease-in-out infinite;}
  @keyframes tileJiggle{0%{transform:rotate(-1deg);}50%{transform:rotate(1deg);}100%{transform:rotate(-1deg);}}
  .cat-tile.tile-dragging{animation:none;opacity:0.96;box-shadow:0 14px 32px rgba(0,0,0,0.45);transform:scale(1.04);}
  .drag-handle{position:absolute;top:8px;right:8px;color:var(--text-faint);font-size:14px;}
  .cat-tile .avatar{width:38px;height:38px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:18px;}
  .cat-tile .cname{font-size:15px;font-weight:600;margin:0;}
  .cat-tile .ccount{font-size:12px;color:var(--text-soft);margin:0;}
  .cat-tile.add-tile{align-items:center;justify-content:center;flex-direction:row;gap:8px;color:var(--teal);border-style:dashed;min-height:76px;}

  .reorder-bar{
    display:flex;align-items:center;justify-content:space-between;gap:10px;
    background:var(--accent-bg);border:1px solid var(--teal);border-radius:10px;padding:9px 12px;margin-bottom:12px;font-size:12px;color:var(--teal);
  }
  .reorder-bar button{border:none;background:var(--teal);color:#06231B;font-size:12.5px;font-weight:600;padding:6px 14px;border-radius:20px;flex-shrink:0;}

  .list-group{margin-bottom:18px;}
  .list-group-title{font-size:12.5px;font-weight:600;color:var(--text-soft);margin:0 0 8px 2px;}
  .list-rows{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;}
  .list-row{display:flex;flex-direction:column;border-top:1px solid var(--border);background:var(--surface);}
  .list-row:first-child{border-top:none;}
  .list-row.row-dragging{box-shadow:0 14px 30px rgba(0,0,0,0.5);border-radius:12px;}
  .row-top{display:flex;align-items:center;}
  .row-handle{padding:12px 2px 12px 12px;color:var(--text-faint);flex-shrink:0;display:flex;align-items:center;touch-action:none;-webkit-user-select:none;user-select:none;font-size:14px;}
  .row-main{flex:1;display:flex;align-items:baseline;gap:6px;padding:12px 12px 12px 6px;background:none;border:none;color:var(--text);text-align:left;overflow:hidden;min-width:0;}
  .row-main::before{content:'\2022';color:var(--teal);font-weight:700;flex-shrink:0;}
  .row-name{font-size:14.5px;font-weight:500;flex-shrink:0;}
  .row-addr{font-size:12.5px;color:var(--text-soft);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0;}
  .row-addr.row-empty{color:var(--text-faint);}
  .row-cat{font-size:11px;color:var(--text-faint);flex-shrink:0;}
  .row-actions{display:flex;gap:2px;padding-right:8px;flex-shrink:0;}
  .row-actions button{border:none;background:transparent;color:var(--text-faint);font-size:14px;padding:6px;}
  .row-actions button:active{color:var(--danger);}
  .row-note{font-size:11.5px;color:var(--text-faint);padding:0 12px 8px 32px;line-height:1.5;}
  .row-navtag{
    display:inline-flex;align-items:center;gap:4px;font-size:10.5px;color:var(--teal);
    margin:0 12px 10px 32px;padding:2px 8px;border-radius:20px;background:var(--accent-bg);
  }

  .cat-manage-row{display:flex;align-items:center;gap:8px;padding:11px 12px;background:var(--surface);border:1px solid var(--border);border-radius:10px;margin-bottom:8px;}
  .cat-manage-row .cdot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
  .cat-manage-name{flex:1;font-size:14.5px;}
  .cat-manage-row button{border:none;background:transparent;color:var(--text-faint);font-size:15px;padding:4px 6px;}
  .cat-manage-row button:active{color:var(--danger);}
  .cat-add-btn{width:100%;padding:11px;border-radius:10px;border:1px dashed var(--border-strong);background:transparent;color:var(--teal);font-size:14px;font-weight:500;}

  .tabbar{
    position:fixed;left:0;right:0;bottom:0;background:rgba(23,23,27,0.92);backdrop-filter:blur(16px);
    border-top:1px solid var(--border);padding:10px 0 calc(8px + env(safe-area-inset-bottom));
    display:flex;justify-content:center;z-index:15;
  }
  .tabbar-inner{display:flex;max-width:480px;width:100%;}
  .tab-btn{flex:1;border:none;background:transparent;color:var(--text-faint);display:flex;flex-direction:column;align-items:center;gap:3px;font-size:10.5px;padding:2px 0;transition:color .15s ease;}
  .tab-btn i{font-size:21px;transition:transform .18s var(--ease);}
  .tab-btn.active{color:var(--teal);}
  .tab-btn.active i{transform:translateY(-1px) scale(1.08);}

  .fab{
    position:fixed;right:18px;bottom:calc(78px + env(safe-area-inset-bottom));width:54px;height:54px;border-radius:50%;
    background:var(--teal);color:#06231B;border:none;font-size:24px;display:flex;align-items:center;justify-content:center;
    box-shadow:0 8px 20px rgba(53,201,165,0.35);z-index:14;transition:transform .18s var(--ease), box-shadow .18s ease;
  }
  .fab:active{transform:scale(0.9);background:var(--teal-deep);}

  .sheet-backdrop{position:fixed;inset:0;background:rgba(0,0,0,0.55);display:none;z-index:20;opacity:0;transition:opacity .2s ease;}
  .sheet-backdrop.open{display:block;opacity:1;}
  .sheet{
    position:fixed;left:0;right:0;bottom:0;background:var(--bg);border-top:1px solid var(--border-strong);
    border-radius:18px 18px 0 0;padding:16px 18px calc(22px + env(safe-area-inset-bottom));
    transform:translateY(100%);transition:transform .3s var(--ease);z-index:21;max-height:86vh;overflow-y:auto;
  }
  .sheet.open{transform:translateY(0);}
  .sheet-handle{width:36px;height:4px;border-radius:2px;background:var(--border-strong);margin:0 auto 14px;}
  .sheet h3{margin:0 0 14px;font-size:16.5px;font-weight:600;}

  .modal-center{
    position:fixed;left:50%;top:50%;transform:translate(-50%,-50%) scale(0.92);opacity:0;pointer-events:none;
    background:var(--bg);border:1px solid var(--border-strong);border-radius:18px;
    padding:18px 18px calc(18px + env(safe-area-inset-bottom));width:calc(100% - 48px);max-width:400px;max-height:78vh;overflow-y:auto;
    transition:transform .22s var(--ease), opacity .18s ease;z-index:22;
  }
  .modal-center.open{transform:translate(-50%,-50%) scale(1);opacity:1;pointer-events:auto;}
  .modal-center h3{margin:0 0 14px;font-size:16.5px;font-weight:600;}
  .modal-small{max-width:320px;}

  .field{margin-bottom:14px;}
  .field label{display:block;font-size:12px;color:var(--text-soft);margin-bottom:6px;font-weight:600;}
  .field input, .field textarea{
    width:100%;padding:11px 12px;border:1px solid var(--border);border-radius:9px;
    background:var(--surface);color:var(--text);font-size:15.5px;transition:border-color .15s ease;
  }
  .field textarea{font-family:inherit;font-size:15px;resize:vertical;min-height:64px;}
  .field input::placeholder, .field textarea::placeholder{color:var(--text-faint);}
  .field input:focus, .field textarea:focus{outline:none;border-color:var(--teal);}

  .chip-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px;}
  .chip{
    display:flex;align-items:center;gap:6px;padding:7px 13px;border-radius:20px;border:1px solid var(--border);
    font-size:13px;color:var(--text-soft);background:var(--surface);transition:all .15s ease;
  }
  .chip .cdot{width:7px;height:7px;border-radius:50%;}
  .chip.active{border-color:var(--teal);color:var(--text);background:var(--accent-bg);}
  .chip.add-new{color:var(--teal);border-style:dashed;}

  .sheet-actions{display:flex;gap:10px;margin-top:18px;}
  .sheet-actions button{flex:1;padding:13px;border-radius:10px;font-size:15px;font-weight:600;border:none;}
  .btn-cancel{background:var(--surface);color:var(--text-soft);border:1px solid var(--border) !important;}
  .btn-save{background:var(--teal);color:#06231B;}
  .btn-danger{background:rgba(255,107,91,0.14);color:var(--danger);}

  .settings-block{margin-bottom:22px;}
  .settings-block h4{font-size:12px;color:var(--text-soft);margin:0 0 10px;text-transform:uppercase;letter-spacing:0.4px;}
  .account-row{display:flex;align-items:center;justify-content:space-between;padding:13px 14px;background:var(--surface);border:1px solid var(--border);border-radius:10px;}
  .account-row .email{font-size:14px;}
  .account-row .sub{font-size:11.5px;color:var(--text-soft);margin-top:2px;}
  .link-btn{background:none;border:none;color:var(--danger);font-size:13.5px;}

  .login-wrap{padding:80px 24px 24px;max-width:400px;margin:0 auto;}
  .login-wrap h2{font-size:21px;margin:0 0 8px;}
  .login-wrap p{font-size:13.5px;color:var(--text-soft);line-height:1.7;margin:0 0 22px;}
  .login-wrap .field input{padding:13px;}
  .login-wrap button{width:100%;padding:13px;border-radius:10px;border:none;background:var(--teal);color:#06231B;font-size:15px;font-weight:600;margin-top:6px;}
  .login-hint{font-size:12px;color:var(--text-faint);margin-top:14px;line-height:1.6;}
</style>
</head>
<body>

<div id="app"></div>

<div class="sheet-backdrop" id="backdrop"></div>
<div class="sheet" id="sheet">
  <div class="sheet-handle"></div>
  <h3 id="sheetTitle">添加地点</h3>
  <div class="field">
    <label>名称</label>
    <input type="text" id="fName" placeholder="比如：楼下那家川菜馆">
  </div>
  <div class="field">
    <label>分类</label>
    <div class="chip-row" id="catRow"></div>
  </div>
  <div class="field">
    <label>地址</label>
    <input type="text" id="fAddr" placeholder="尽量写详细一点，方便导航">
  </div>
  <div class="field">
    <label>打开方式</label>
    <div class="chip-row" id="navRow"></div>
  </div>
  <div class="field">
    <label>备注</label>
    <textarea id="fNote" placeholder="比如：周三休息 / 停车要绕到后门"></textarea>
  </div>
  <div class="sheet-actions">
    <button class="btn-cancel" id="btnCancel">取消</button>
    <button class="btn-save" id="btnSave">保存</button>
  </div>
</div>

<div class="sheet-backdrop" id="catBackdrop"></div>
<div class="modal-center" id="catSheet">
  <h3 id="catSheetTitle">分类</h3>
  <button class="btn-save" id="btnAddToCat" style="width:100%;padding:12px;border-radius:10px;border:none;font-size:14.5px;font-weight:600;margin-bottom:14px;">+ 添加地点到这里</button>
  <div id="catSheetList"></div>
  <div class="sheet-actions">
    <button class="btn-danger" id="btnDeleteCat">删除这个分类</button>
    <button class="btn-cancel" id="btnCatClose">关闭</button>
  </div>
</div>

<div class="sheet-backdrop" id="quickBackdrop"></div>
<div class="modal-center modal-small" id="quickModal">
  <h3 id="quickModalTitle">新建分类</h3>
  <div class="field">
    <input type="text" id="quickInput" placeholder="名称">
  </div>
  <div class="sheet-actions">
    <button class="btn-cancel" id="btnQuickCancel">取消</button>
    <button class="btn-save" id="btnQuickConfirm">确定</button>
  </div>
</div>

<div class="sheet-backdrop" id="settingsBackdrop"></div>
<div class="sheet" id="settingsSheet">
  <div class="sheet-handle"></div>
  <h3>设置</h3>

  <div class="settings-block" id="accountBlock">
    <h4>账户与同步</h4>
    <div id="accountContent"></div>
  </div>

  <div class="settings-block">
    <h4>分类管理</h4>
    <div id="catManageList"></div>
    <button class="cat-add-btn" id="btnAddCatSettings">+ 新建分类</button>
  </div>

  <div class="settings-block">
    <h4>跳转地图</h4>
    <div class="chip-row" id="appChoice"></div>
  </div>

  <div class="settings-block">
    <h4>出行方式</h4>
    <div class="chip-row" id="modeChoice"></div>
  </div>

  <div class="sheet-actions">
    <button class="btn-cancel" id="btnSettingsClose">完成</button>
  </div>
</div>

<script type="module">
import { init, id } from "https://esm.sh/@instantdb/core";

const INSTANT_APP_ID = "35bb7cc3-5ccf-4d3e-b2a9-31511cc34c75";
const CLOUD_MODE = INSTANT_APP_ID && INSTANT_APP_ID !== "__APP_ID__" && INSTANT_APP_ID.length > 8;

const CAT_COLORS = [
  {bg:'rgba(53,201,165,0.16)', fg:'#35C9A5'},
  {bg:'rgba(91,159,239,0.16)', fg:'#5B9FEF'},
  {bg:'rgba(255,138,101,0.16)', fg:'#FF8A65'},
  {bg:'rgba(167,139,250,0.16)', fg:'#A78BFA'},
  {bg:'rgba(244,114,182,0.16)', fg:'#F472B6'},
  {bg:'rgba(251,191,36,0.16)', fg:'#FBBF24'},
  {bg:'rgba(74,222,128,0.16)', fg:'#4ADE80'},
  {bg:'rgba(248,113,113,0.16)', fg:'#F87171'},
];
const DEFAULT_CATS = ['超市','餐厅','其他'];
const LOCAL_KEY = 'places-book-v3';
const NAV_APP_KEY = 'nav-app-pref';
const NAV_MODE_KEY = 'nav-mode-pref';
const APP_NAMES = {apple:'苹果地图', google:'谷歌地图', amap:'高德地图'};
const MODE_NAMES = {drive:'开车', walk:'步行', transit:'公共交通'};
const MODE_ICONS = {drive:'ti-car', walk:'ti-walk', transit:'ti-bus'};

let places = [];
let categories = [];
let authUser = null;
let viewIndex = parseInt(localStorage.getItem('view-index')||'0', 10);
let activeTab = 'home';
let searchQuery = '';
let editingId = null;
let selectedCatName = null;
let lockedCatName = null;
let selectedNavOverride = null;
let catSheetName = null;
let db = null;
let sentEmail = '';
let reorderMode = false;
let dragCatId = null, dragOffsetX = 0, dragOffsetY = 0, dragElRef = null, dragCache = [];
let quickConfirmHandler = null;

function uid(){ return CLOUD_MODE ? id() : (Date.now().toString(36) + Math.random().toString(36).slice(2,7)); }
function escapeHtml(s){ return (s||'').replace(/[&<>"']/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }
function escapeAttr(s){ return (s||'').replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/"/g,'&quot;'); }

/* ================= 数据层 ================= */
function loadLocal(){
  try{ const raw = localStorage.getItem(LOCAL_KEY); return raw ? JSON.parse(raw) : null; }catch(e){ return null; }
}
function saveLocal(){ localStorage.setItem(LOCAL_KEY, JSON.stringify({places, categories})); }

function seedDefaultsIfEmpty(){
  if(categories.length === 0){
    DEFAULT_CATS.forEach((name, i)=>{
      const cat = { id: uid(), name, colorIndex: i % CAT_COLORS.length, order: i, createdAt: Date.now() };
      if(CLOUD_MODE){
        db.transact(db.tx.categories[cat.id].update({name:cat.name, colorIndex:cat.colorIndex, order:cat.order, createdAt:cat.createdAt, owner:authUser.id}));
      } else {
        categories.push(cat);
      }
    });
    if(!CLOUD_MODE) saveLocal();
  }
}

function addCategory(name){
  const trimmed = name.trim();
  if(!trimmed) return null;
  const exists = categories.find(c=>c.name.toLowerCase()===trimmed.toLowerCase());
  if(exists) return exists;
  const cat = { id: uid(), name: trimmed, colorIndex: categories.length % CAT_COLORS.length, order: categories.length, createdAt: Date.now() };
  if(CLOUD_MODE){
    db.transact(db.tx.categories[cat.id].update({name:cat.name, colorIndex:cat.colorIndex, order:cat.order, createdAt:cat.createdAt, owner:authUser.id}));
    categories.push(cat);
  } else {
    categories.push(cat);
    saveLocal();
  }
  return cat;
}
function deleteCategory(catId){
  const cat = categories.find(c=>c.id===catId);
  if(!cat) return;
  const inUse = places.some(p=>p.cat===cat.name);
  if(inUse){ alert('这个分类里还有地点，先删掉或者改分类再删除它。'); return; }
  if(CLOUD_MODE){
    db.transact(db.tx.categories[catId].delete());
  } else {
    categories = categories.filter(c=>c.id!==catId);
    saveLocal(); renderAll();
  }
}
function addPlace({name, cat, addr, note, navApp}){
  const sameCat = places.filter(p=>p.cat===cat);
  const p = { id: uid(), name, cat, addr, note: note||'', navApp: navApp||null, sortOrder: sameCat.length, createdAt: Date.now() };
  if(CLOUD_MODE){
    db.transact(db.tx.places[p.id].update({name, cat, addr, note:p.note, navApp:p.navApp, sortOrder:p.sortOrder, createdAt:p.createdAt, owner:authUser.id}));
  } else {
    places.push(p); saveLocal(); renderAll();
  }
}
function updatePlace(pid, patch){
  if(CLOUD_MODE){
    db.transact(db.tx.places[pid].update(patch));
  } else {
    const p = places.find(p=>p.id===pid);
    if(p) Object.assign(p, patch);
    saveLocal(); renderAll();
  }
}
function deletePlace(pid){
  if(CLOUD_MODE){
    db.transact(db.tx.places[pid].delete());
  } else {
    places = places.filter(p=>p.id!==pid);
    saveLocal(); renderAll();
  }
}

function getNavApp(){ return localStorage.getItem(NAV_APP_KEY) || 'apple'; }
function setNavApp(v){ localStorage.setItem(NAV_APP_KEY, v); }
function getNavMode(){ return localStorage.getItem(NAV_MODE_KEY) || 'drive'; }
function setNavMode(v){ localStorage.setItem(NAV_MODE_KEY, v); }

function navLabel(place){
  const app = (place && place.navApp) || getNavApp();
  const mode = getNavMode();
  if(app === 'amap'){
    return { text: APP_NAMES.amap + ' · 搜索地址', icon: 'ti-map-2' };
  }
  return { text: APP_NAMES[app] + ' · ' + MODE_NAMES[mode], icon: MODE_ICONS[mode] };
}

function buildNavUrl(app, mode, address){
  const encoded = encodeURIComponent(address);
  if(app === 'google'){
    const tmode = {drive:'driving', walk:'walking', transit:'transit'}[mode];
    return 'https://www.google.com/maps/dir/?api=1&destination=' + encoded + '&travelmode=' + tmode;
  }
  if(app === 'amap'){
    return 'https://uri.amap.com/search?keyword=' + encoded + '&src=memorylossapp';
  }
  const dirflg = {drive:'d', walk:'w', transit:'r'}[mode];
  return 'https://maps.apple.com/?daddr=' + encoded + '&dirflg=' + dirflg;
}

window.openNav = function(placeId){
  const p = places.find(x=>x.id===placeId);
  if(!p) return;
  const app = p.navApp || getNavApp();
  const mode = getNavMode();
  const address = p.addr || p.name;
  window.open(buildNavUrl(app, mode, address), '_blank');
};

/* ================= 方块拖拽排序 ================= */
function bindGridTileEvents(){
  const grid = document.getElementById('catGrid');
  if(!grid) return;
  grid.querySelectorAll('.cat-tile[data-cat-id]').forEach(tile=>{
    tile.addEventListener('pointerdown', onTilePointerDown);
  });
}
function onTilePointerDown(e){
  if(e.pointerType === 'mouse' && e.button !== 0) return;
  const tile = e.currentTarget;
  const catId = tile.getAttribute('data-cat-id');
  const startX = e.clientX, startY = e.clientY;
  const startTime = Date.now();
  let moved = false, dragging = false, longPressTimer = null;

  function onMove(ev){
    const dx = ev.clientX-startX, dy = ev.clientY-startY;
    if(Math.abs(dx)>10 || Math.abs(dy)>10) moved = true;
    if(dragging){ ev.preventDefault(); updateDragTile(ev.clientX, ev.clientY); }
  }
  function onUp(){
    document.removeEventListener('pointermove', onMove);
    document.removeEventListener('pointerup', onUp);
    clearTimeout(longPressTimer);
    if(dragging){ endDragTile(); return; }
    if(!moved && Date.now()-startTime < 500 && !reorderMode){
      const cat = categories.find(c=>c.id===catId);
      if(cat) openCatSheet(cat.name);
    }
  }
  document.addEventListener('pointermove', onMove, {passive:false});
  document.addEventListener('pointerup', onUp);

  if(reorderMode){
    dragging = true;
    startDragTile(tile, catId, startX, startY);
  } else {
    longPressTimer = setTimeout(()=>{
      if(!moved){
        reorderMode = true;
        const body = document.getElementById('homeBody');
        body.innerHTML = homeBodyHTML();
        bindHomeBodyEvents();
        const freshTile = document.querySelector(`.cat-tile[data-cat-id="${catId}"]`);
        if(freshTile){ dragging = true; startDragTile(freshTile, catId, startX, startY); }
      }
    }, 480);
  }
}
function startDragTile(tile, catId, startX, startY){
  dragCatId = catId; dragElRef = tile;
  const rect = tile.getBoundingClientRect();
  dragOffsetX = startX - rect.left; dragOffsetY = startY - rect.top;
  tile.style.position = 'fixed'; tile.style.left = rect.left+'px'; tile.style.top = rect.top+'px';
  tile.style.width = rect.width+'px'; tile.style.height = rect.height+'px'; tile.style.zIndex = '60';
  tile.classList.add('tile-dragging');
  refreshDragSiblingCache();
  if(navigator.vibrate) navigator.vibrate(8);
}
function refreshDragSiblingCache(){
  const grid = document.getElementById('catGrid');
  if(!grid) return;
  dragCache = Array.from(grid.querySelectorAll('.cat-tile[data-cat-id]'))
    .filter(el=>el.getAttribute('data-cat-id')!==dragCatId)
    .map(el=>({ catId: el.getAttribute('data-cat-id'), rect: el.getBoundingClientRect() }));
}
function updateDragTile(clientX, clientY){
  if(!dragElRef) return;
  dragElRef.style.left = (clientX-dragOffsetX)+'px';
  dragElRef.style.top = (clientY-dragOffsetY)+'px';
  let target = null;
  for(const item of dragCache){
    if(clientX>=item.rect.left && clientX<=item.rect.right && clientY>=item.rect.top && clientY<=item.rect.bottom){ target = item; break; }
  }
  if(target){
    const fromIdx = categories.findIndex(c=>c.id===dragCatId);
    const toIdx = categories.findIndex(c=>c.id===target.catId);
    if(fromIdx!==-1 && toIdx!==-1 && fromIdx!==toIdx){
      const [moved] = categories.splice(fromIdx,1);
      categories.splice(toIdx,0,moved);
      reflowGridOrder();
      refreshDragSiblingCache();
    }
  }
}
function reflowGridOrder(){
  const grid = document.getElementById('catGrid');
  if(!grid) return;
  categories.forEach(cat=>{
    const el = grid.querySelector(`.cat-tile[data-cat-id="${cat.id}"]`);
    if(el) grid.appendChild(el);
  });
  const addTile = grid.querySelector('.add-tile');
  if(addTile) grid.appendChild(addTile);
}
function endDragTile(){
  if(!dragElRef) return;
  dragElRef.style.position=''; dragElRef.style.left=''; dragElRef.style.top='';
  dragElRef.style.width=''; dragElRef.style.height=''; dragElRef.style.zIndex='';
  dragElRef.classList.remove('tile-dragging');
  dragElRef = null; dragCatId = null;
  categories.forEach((c,i)=> c.order = i);
  if(CLOUD_MODE){
    const txs = categories.map(c=> db.tx.categories[c.id].update({order:c.order}));
    if(txs.length) db.transact(txs);
  } else { saveLocal(); }
}
window.exitReorderMode = function(){
  reorderMode = false;
  const body = document.getElementById('homeBody');
  if(body){ body.innerHTML = homeBodyHTML(); bindHomeBodyEvents(); }
};

/* ================= 地点拖拽排序（列表页，按分类分组） ================= */
function bindRowDragHandles(){
  document.querySelectorAll('.row-handle[data-place-id]').forEach(handle=>{
    handle.addEventListener('pointerdown', onRowHandlePointerDown);
  });
}
function onRowHandlePointerDown(e){
  e.preventDefault();
  const handle = e.currentTarget;
  const rowEl = handle.closest('.list-row');
  const container = rowEl.parentElement;
  const placeId = handle.getAttribute('data-place-id');
  const startY = e.clientY;
  const rect = rowEl.getBoundingClientRect();
  const offsetY = startY - rect.top;
  rowEl.style.position = 'fixed'; rowEl.style.left = rect.left+'px'; rowEl.style.top = rect.top+'px';
  rowEl.style.width = rect.width+'px'; rowEl.style.zIndex = '60';
  rowEl.classList.add('row-dragging');
  let siblingCache = computeRowSiblingCache(container, placeId);
  if(navigator.vibrate) navigator.vibrate(8);

  function onMove(ev){
    rowEl.style.top = (ev.clientY-offsetY)+'px';
    let target = null;
    for(const item of siblingCache){
      if(ev.clientY>=item.rect.top && ev.clientY<=item.rect.bottom){ target = item; break; }
    }
    if(target){
      const place = places.find(p=>p.id===placeId);
      if(!place) return;
      const group = sortedPlacesInCat(place.cat);
      const fromIdx = group.findIndex(p=>p.id===placeId);
      const toIdx = group.findIndex(p=>p.id===target.placeId);
      if(fromIdx!==-1 && toIdx!==-1 && fromIdx!==toIdx){
        const [moved] = group.splice(fromIdx,1);
        group.splice(toIdx,0,moved);
        group.forEach((p,i)=>{ p.sortOrder = i; });
        group.forEach(p=>{
          const el = container.querySelector(`.list-row[data-place-id="${p.id}"]`);
          if(el) container.appendChild(el);
        });
        siblingCache = computeRowSiblingCache(container, placeId);
      }
    }
  }
  function onUp(){
    document.removeEventListener('pointermove', onMove);
    document.removeEventListener('pointerup', onUp);
    rowEl.style.position=''; rowEl.style.left=''; rowEl.style.top=''; rowEl.style.width=''; rowEl.style.zIndex='';
    rowEl.classList.remove('row-dragging');
    const place = places.find(p=>p.id===placeId);
    if(place){
      const group = sortedPlacesInCat(place.cat);
      if(CLOUD_MODE){
        const txs = group.map(p=> db.tx.places[p.id].update({sortOrder:p.sortOrder}));
        if(txs.length) db.transact(txs);
      } else { saveLocal(); }
    }
  }
  document.addEventListener('pointermove', onMove);
  document.addEventListener('pointerup', onUp);
}
function computeRowSiblingCache(container, excludeId){
  return Array.from(container.querySelectorAll('.list-row[data-place-id]'))
    .filter(el=>el.getAttribute('data-place-id')!==excludeId)
    .map(el=>({placeId: el.getAttribute('data-place-id'), rect: el.getBoundingClientRect()}));
}

/* ================= 方块/列表 左右滑动切换 ================= */
function bindPagerSwipe(){
  const viewport = document.getElementById('pagerViewport');
  const track = document.getElementById('pagerTrack');
  if(!viewport || !track) return;
  let startX = 0, startY = 0, dx = 0, tracking = false, decided = false, isHorizontal = false;
  const width = () => viewport.getBoundingClientRect().width;

  viewport.addEventListener('pointerdown', (e)=>{
    if(reorderMode) return;
    startX = e.clientX; startY = e.clientY; dx = 0; tracking = true; decided = false; isHorizontal = false;
  });
  viewport.addEventListener('pointermove', (e)=>{
    if(!tracking) return;
    const mx = e.clientX-startX, my = e.clientY-startY;
    if(!decided){
      if(Math.abs(mx) > 8 || Math.abs(my) > 8){
        decided = true;
        isHorizontal = Math.abs(mx) > Math.abs(my);
        if(isHorizontal) track.classList.add('dragging');
      }
    }
    if(decided && isHorizontal){
      e.preventDefault();
      dx = mx;
      let pct = (dx / width()) * 50;
      let base = -viewIndex*50;
      let next = base + pct;
      if(next > 0) next = next * 0.4;
      if(next < -50) next = -50 + (next+50)*0.4;
      track.style.transform = `translateX(${next}%)`;
    }
  }, {passive:false});
  function finish(){
    if(!tracking) return;
    tracking = false;
    if(decided && isHorizontal){
      track.classList.remove('dragging');
      const threshold = width() * 0.18;
      let next = viewIndex;
      if(dx < -threshold && viewIndex===0) next = 1;
      else if(dx > threshold && viewIndex===1) next = 0;
      window.setViewIndex(next);
    }
  }
  viewport.addEventListener('pointerup', finish);
  viewport.addEventListener('pointercancel', finish);
}

  categories.slice().sort((a,b)=>a.order-b.order).forEach(c=>{
    const col = CAT_COLORS[c.colorIndex % CAT_COLORS.length];
    html += `<button type="button" class="chip ${c.name===selectedCatName?'active':''}" data-cat="${escapeAttr(c.name)}"><span class="cdot" style="background:${col.fg}"></span>${escapeHtml(c.name)}</button>`;
  });
  html += `<button type="button" class="chip add-new" id="addCatBtn"><i class="ti ti-plus" style="font-size:12px"></i>新分类</button>`;
  catRow.innerHTML = html;
  catRow.querySelectorAll('.chip[data-cat]').forEach(btn=>{
    btn.addEventListener('click', ()=>{ selectedCatName = btn.getAttribute('data-cat'); renderCatRow(); });
  });
  document.getElementById('addCatBtn').addEventListener('click', ()=>{
    showQuickInput('新建分类', '', (name)=>{
      const cat = addCategory(name);
      selectedCatName = cat.name;
      renderCatRow();
    });
  });
}

function renderNavRow(){
  const opts = [
    {key:null, label:'跟随设置'},
    {key:'apple', label:'苹果地图'},
    {key:'google', label:'谷歌地图'},
    {key:'amap', label:'高德地图'},
  ];
  navRow.innerHTML = opts.map(o=>
    `<button type="button" class="chip ${selectedNavOverride===o.key?'active':''}" data-nav="${o.key||''}">${o.label}</button>`
  ).join('');
  navRow.querySelectorAll('.chip[data-nav]').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      selectedNavOverride = btn.getAttribute('data-nav') || null;
      renderNavRow();
    });
  });
}

function openSheet(place, presetCat){
  editingId = place ? place.id : null;
  lockedCatName = (!place && presetCat) ? presetCat : null;
  sheetTitle.textContent = place ? '编辑地点' : '添加地点';
  fName.value = place ? place.name : '';
  fAddr.value = place ? place.addr : '';
  fNote.value = place ? (place.note || '') : '';
  selectedCatName = lockedCatName || (place ? place.cat : (categories[0] ? categories[0].name : null));
  selectedNavOverride = place ? (place.navApp || null) : null;
  renderCatRow();
  renderNavRow();
  backdrop.classList.add('open'); sheet.classList.add('open');
  setTimeout(()=>fName.focus(), 200);
}
function closeSheet(){ backdrop.classList.remove('open'); sheet.classList.remove('open'); }
document.getElementById('btnCancel').addEventListener('click', closeSheet);
backdrop.addEventListener('click', closeSheet);

document.getElementById('btnSave').addEventListener('click', ()=>{
  const name = fName.value.trim();
  if(!name){ fName.focus(); return; }
  const catName = selectedCatName;
  if(!catName){ alert('请选择或新建一个分类'); return; }
  const addr = fAddr.value.trim();
  const note = fNote.value.trim();
  const navApp = selectedNavOverride;
  if(editingId){
    updatePlace(editingId, {name, cat:catName, addr, note, navApp});
  } else {
    addPlace({name, cat:catName, addr, note, navApp});
  }
  closeSheet();
  if(catSheet.classList.contains('open') && catSheetName){
    setTimeout(()=>openCatSheet(catSheetName), 60);
  }
});

window.editPlace = function(pid){
  const p = places.find(p=>p.id===pid);
  if(p) openSheet(p);
};

/* ================= 分类详情弹窗 ================= */
const catSheet = document.getElementById('catSheet');
const catBackdrop = document.getElementById('catBackdrop');
window.openCatSheet = function(catName){
  catSheetName = catName;
  document.getElementById('catSheetTitle').textContent = catName;
  const items = sortedPlacesInCat(catName);
  const listEl = document.getElementById('catSheetList');
  listEl.innerHTML = items.length
    ? `<div class="list-rows">${items.map(p=>rowHTML(p,{draggable:false})).join('')}</div>`
    : `<div class="empty" style="padding:30px 10px;"><p>这个分类还没有地点</p></div>`;
  catBackdrop.classList.add('open'); catSheet.classList.add('open');
};
function closeCatSheet(){ catBackdrop.classList.remove('open'); catSheet.classList.remove('open'); }
document.getElementById('btnCatClose').addEventListener('click', closeCatSheet);
catBackdrop.addEventListener('click', closeCatSheet);
document.getElementById('btnAddToCat').addEventListener('click', ()=>{
  const presetCat = catSheetName;
  closeCatSheet();
  openSheet(null, presetCat);
});
document.getElementById('btnDeleteCat').addEventListener('click', ()=>{
  const cat = categories.find(c=>c.name===catSheetName);
  if(cat){ deleteCategory(cat.id); closeCatSheet(); }
});

/* ================= 设置弹窗 ================= */
const settingsSheet = document.getElementById('settingsSheet');
const settingsBackdrop = document.getElementById('settingsBackdrop');
const appChoice = document.getElementById('appChoice');
const modeChoice = document.getElementById('modeChoice');

function renderAppChoice(){
  const cur = getNavApp();
  appChoice.innerHTML = ['apple','google','amap'].map(a=>
    `<button type="button" class="chip ${a===cur?'active':''}" data-app="${a}">${APP_NAMES[a]}</button>`
  ).join('');
  appChoice.querySelectorAll('.chip[data-app]').forEach(btn=>{
    btn.addEventListener('click', ()=>{ setNavApp(btn.getAttribute('data-app')); renderAppChoice(); renderAll(); });
  });
}
function renderModeChoice(){
  const cur = getNavMode();
  modeChoice.innerHTML = ['drive','walk','transit'].map(m=>
    `<button type="button" class="chip ${m===cur?'active':''}" data-mode="${m}"><i class="ti ${MODE_ICONS[m]}" style="font-size:13px;"></i>${MODE_NAMES[m]}</button>`
  ).join('');
  modeChoice.querySelectorAll('.chip[data-mode]').forEach(btn=>{
    btn.addEventListener('click', ()=>{ setNavMode(btn.getAttribute('data-mode')); renderModeChoice(); renderAll(); });
  });
}

function renderAccountBlock(){
  const el = document.getElementById('accountContent');
  if(!CLOUD_MODE){
    el.innerHTML = `<p style="font-size:12.5px;color:var(--text-soft);line-height:1.6;margin:0;">当前是仅本机存储模式，换手机数据不会跟过去。</p>`;
    return;
  }
  el.innerHTML = `<div class="account-row">
    <div><div class="email">${authUser ? escapeHtml(authUser.email) : ''}</div><div class="sub">数据已同步到云端</div></div>
    <button class="link-btn" id="btnSignOut">退出登录</button>
  </div>`;
  const so = document.getElementById('btnSignOut');
  if(so) so.addEventListener('click', ()=> db.auth.signOut());
}

function renderCatManageList(){
  const el = document.getElementById('catManageList');
  if(!el) return;
  const sorted = categories.slice().sort((a,b)=>a.order-b.order);
  el.innerHTML = sorted.length ? sorted.map(c=>{
    const col = CAT_COLORS[c.colorIndex % CAT_COLORS.length];
    return `<div class="cat-manage-row">
      <span class="cdot" style="background:${col.fg}"></span>
      <span class="cat-manage-name">${escapeHtml(c.name)}</span>
      <button onclick="renameCategory('${c.id}')" aria-label="重命名"><i class="ti ti-pencil"></i></button>
      <button onclick="removeCategoryFromSettings('${c.id}')" aria-label="删除"><i class="ti ti-trash"></i></button>
    </div>`;
  }).join('') : `<p style="font-size:12.5px;color:var(--text-soft);">还没有分类，点下面新建一个</p>`;
}

function renameCategory(catId){
  const cat = categories.find(c=>c.id===catId);
  if(!cat) return;
  showQuickInput('重命名分类', cat.name, (trimmed)=>{
    if(trimmed === cat.name) return;
    const dup = categories.find(c=>c.id!==catId && c.name.toLowerCase()===trimmed.toLowerCase());
    if(dup){ alert('已经有同名分类了'); return; }
    const oldName = cat.name;
    const affected = places.filter(p=>p.cat===oldName);
    if(CLOUD_MODE){
      const txs = [db.tx.categories[catId].update({name:trimmed})];
      affected.forEach(p=> txs.push(db.tx.places[p.id].update({cat:trimmed})));
      db.transact(txs);
      cat.name = trimmed;
      affected.forEach(p=> p.cat = trimmed);
    } else {
      cat.name = trimmed;
      affected.forEach(p=> p.cat = trimmed);
      saveLocal();
    }
    renderAll();
    setTimeout(renderCatManageList, 60);
  });
}
window.renameCategory = renameCategory;

function removeCategoryFromSettings(catId){
  deleteCategory(catId);
  setTimeout(renderCatManageList, 60);
}
window.removeCategoryFromSettings = removeCategoryFromSettings;

document.getElementById('btnAddCatSettings').addEventListener('click', createCategoryFlow);

function openSettings(){
  renderAccountBlock();
  renderCatManageList();
  renderAppChoice();
  renderModeChoice();
  settingsBackdrop.classList.add('open'); settingsSheet.classList.add('open');
}
function closeSettings(){ settingsBackdrop.classList.remove('open'); settingsSheet.classList.remove('open'); }
settingsBackdrop.addEventListener('click', closeSettings);
document.getElementById('btnSettingsClose').addEventListener('click', closeSettings);

/* ================= 登录页（仅云同步模式） ================= */
function renderLogin(){
  if(!sentEmail){
    appEl.innerHTML = `
      <div class="login-wrap fade-in">
        <h2>登录同步账户</h2>
        <p>输入邮箱，我们会发一个验证码过去，用同一个邮箱登录就能在所有设备上看到同样的数据。</p>
        <form id="emailForm">
          <div class="field"><input type="email" id="emailInput" placeholder="你的邮箱" required autofocus></div>
          <button type="submit">发送验证码</button>
        </form>
      </div>`;
    document.getElementById('emailForm').addEventListener('submit', (e)=>{
      e.preventDefault();
      const email = document.getElementById('emailInput').value.trim();
      sentEmail = email;
      renderLogin();
      db.auth.sendMagicCode({email}).catch(err=>{
        alert('发送失败：' + (err.body?.message || '请稍后重试'));
        sentEmail = ''; renderLogin();
      });
    });
  } else {
    appEl.innerHTML = `
      <div class="login-wrap fade-in">
        <h2>输入验证码</h2>
        <p>验证码已经发到 <strong>${escapeHtml(sentEmail)}</strong>，查收邮件后粘贴过来。</p>
        <form id="codeForm">
          <div class="field"><input type="text" id="codeInput" placeholder="123456" required autofocus></div>
          <button type="submit">验证并登录</button>
        </form>
      </div>`;
    document.getElementById('codeForm').addEventListener('submit', (e)=>{
      e.preventDefault();
      const code = document.getElementById('codeInput').value.trim();
      db.auth.signInWithMagicCode({email: sentEmail, code}).catch(err=>{
        alert('验证失败：' + (err.body?.message || '验证码不对，再试试'));
      });
    });
  }
}

/* ================= 启动 ================= */
if(CLOUD_MODE){
  db = init({ appId: INSTANT_APP_ID });
  db.subscribeAuth((auth)=>{
    authUser = auth.user || null;
    sentEmail = '';
    if(authUser){
      db.subscribeQuery({ places:{}, categories:{} }, (resp)=>{
        if(resp.error){ console.error(resp.error); return; }
        if(resp.data){
          places = resp.data.places || [];
          categories = resp.data.categories || [];
          seedDefaultsIfEmpty();
          renderAll();
        }
      });
    } else {
      places = []; categories = [];
      renderAll();
    }
  });
} else {
  const local = loadLocal();
  if(local){ places = local.places || []; categories = local.categories || []; }
  seedDefaultsIfEmpty();
  renderAll();
}
</script>
